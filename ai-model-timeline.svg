<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" width="1400" height="760" role="img" aria-labelledby="title desc">
  <title id="title">AI model timeline from 2020 to April 2026</title>
  <desc id="desc">Chronological timeline of major AI model releases from GPT-3 in 2020 through GPT-5.5 and Claude Opus 4.7 in April 2026.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#09090f"/>
      <stop offset="45%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="50%" stop-color="#7928ca"/>
      <stop offset="100%" stop-color="#00c6ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title{font:800 34px 'Segoe UI',Arial,sans-serif;fill:#fff}
      .subtitle{font:500 16px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .year{font:800 20px 'Segoe UI',Arial,sans-serif;fill:#fff}
      .pill{rx:11;stroke:rgba(255,255,255,.28);stroke-width:1}
      .model{font:700 13px 'Segoe UI',Arial,sans-serif;fill:#fff}
      .small{font:600 11px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
      .legend{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#e5e7eb}
    </style>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)"/>
  <rect x="22" y="22" width="1356" height="716" rx="28" fill="rgba(15,23,42,.78)" stroke="rgba(255,255,255,.16)"/>
  <path d="M55 104 H1345" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <text x="700" y="62" text-anchor="middle" class="title">Frontier AI Model Evolution Timeline</text>
  <text x="700" y="88" text-anchor="middle" class="subtitle">Major public LLM milestones from 2020 to April 2026, ordered oldest to newest</text>

