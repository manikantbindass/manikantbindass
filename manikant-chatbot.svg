<svg xmlns="http://www.w3.org/2000/svg" width="360" height="420" viewBox="0 0 360 420" role="img" aria-labelledby="title desc">
  <title id="title">ManikantChatsU</title>
  <desc id="desc">Animated AI x Web3 chatbot card for Manikant's profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="14" x2="340" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.52" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="aurora" x1="32" y1="26" x2="316" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.34" stop-color="#8b5cf6"/>
      <stop offset="0.68" stop-color="#ff4fd8"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glass" x1="94" y1="82" x2="266" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#162033"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="beam" x1="118" y1="124" x2="242" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.85 0 0 0 0 1 0 0 0 0.4 0" result="tint"/>
      <feMerge>
        <feMergeNode in="tint"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
    <style>
      .float {
        animation: float 5.4s ease-in-out infinite;
      }

      .spin {
        animation: spin 10s linear infinite;
        transform-origin: 180px 150px;
      }

      .spin.reverse {
        animation-direction: reverse;
        animation-duration: 14s;
      }

      .pulse {
        animation: pulse 2.6s ease-in-out infinite;
        transform-origin: 180px 150px;
      }

      .blink {
        animation: blink 2.8s infinite;
        transform-origin: 180px 156px;
      }

      .spark {
        animation: spark 2.1s ease-in-out infinite;
      }

      .spark.two {
        animation-delay: 0.7s;
      }

      .spark.three {
        animation-delay: 1.3s;
      }

      .scan {
        animation: scan 2.4s ease-in-out infinite;
      }

      .shine {
        animation: shine 3.2s linear infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.95; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.03); }
      }

      @keyframes blink {
        0%, 43%, 48%, 100% { transform: scaleY(1); }
        45% { transform: scaleY(0.1); }
      }

      @keyframes spark {
        0%, 100% { opacity: 0.4; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.3); }
      }

      @keyframes scan {
        0%, 100% { opacity: 0.25; transform: translateY(-10px); }
        50% { opacity: 0.95; transform: translateY(12px); }
      }

      @keyframes shine {
        from { transform: translateX(-210px); }
        to { transform: translateX(210px); }
      }
    </style>
  </defs>

  <rect width="360" height="420" rx="34" fill="url(#bg)"/>
  <rect x="22" y="22" width="316" height="376" rx="28" fill="url(#grid)" opacity="0.58"/>

  <g class="float">
    <ellipse cx="92" cy="72" rx="62" ry="28" fill="#22d3ee" opacity="0.18" filter="url(#softGlow)"/>
    <ellipse cx="282" cy="110" rx="74" ry="34" fill="#8b5cf6" opacity="0.16" filter="url(#softGlow)"/>
    <ellipse cx="248" cy="318" rx="86" ry="38" fill="#ff4fd8" opacity="0.15" filter="url(#softGlow)"/>
  </g>

  <g filter="url(#cardGlow)">
    <rect x="40" y="34" width="280" height="324" rx="28" fill="rgba(10,14,28,0.86)" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    <path class="shine" d="M58 40h46l58 318h-46z" fill="rgba(255,255,255,0.08)"/>
  </g>

  <g class="pulse">
    <circle cx="180" cy="150" r="86" fill="none" stroke="url(#aurora)" stroke-width="4" opacity="0.88"/>
    <circle class="spin" cx="180" cy="150" r="106" fill="none" stroke="rgba(34,211,238,0.42)" stroke-width="2.4" stroke-dasharray="16 11"/>
    <circle class="spin reverse" cx="180" cy="150" r="122" fill="none" stroke="rgba(255,79,216,0.38)" stroke-width="2" stroke-dasharray="12 16"/>
  </g>

  <circle cx="180" cy="150" r="66" fill="url(#glass)" stroke="rgba(255,255,255,0.42)" stroke-width="2.4"/>
  <path d="M180 74v-20" stroke="#67e8f9" stroke-width="8" stroke-linecap="round"/>
  <circle cx="180" cy="48" r="11" fill="#f59e0b" stroke="#fff" stroke-width="3"/>
  <rect x="124" y="112" width="112" height="74" rx="26" fill="#0f172a" stroke="url(#aurora)" stroke-width="3.2"/>
  <g class="blink">
    <rect x="145" y="140" width="22" height="16" rx="8" fill="url(#beam)"/>
    <rect x="193" y="140" width="22" height="16" rx="8" fill="url(#beam)"/>
  </g>
  <path d="M148 172c18 14 46 14 64 0" fill="none" stroke="#ff4fd8" stroke-width="6" stroke-linecap="round"/>
  <path d="M108 149H90m162 0h18" stroke="#8b5cf6" stroke-width="7" stroke-linecap="round"/>
  <rect class="scan" x="128" y="122" width="104" height="10" rx="5" fill="rgba(94,234,212,0.4)"/>

  <g fill="#ffffff">
    <circle class="spark" cx="92" cy="112" r="5"/>
    <circle class="spark two" cx="268" cy="84" r="4"/>
    <circle class="spark three" cx="258" cy="228" r="5"/>
  </g>

  <g opacity="0.9">
    <path d="M94 246h172" stroke="rgba(139,92,246,0.45)" stroke-width="1.2"/>
    <path d="M116 262h128" stroke="rgba(34,211,238,0.35)" stroke-width="1.2"/>
    <path d="M142 278h76" stroke="rgba(255,79,216,0.35)" stroke-width="1.2"/>
  </g>

  <rect x="62" y="300" width="236" height="38" rx="14" fill="rgba(9,14,28,0.92)" stroke="url(#aurora)" stroke-width="2"/>
  <text x="180" y="325" text-anchor="middle" font-family="Rajdhani, Trebuchet MS, sans-serif" font-size="25" font-weight="700" fill="#ffffff">ManikantChatsU</text>

  <text x="180" y="359" text-anchor="middle" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="13" letter-spacing="2.4" fill="#7dd3fc">AI x WEB3 README GUIDE</text>
</svg>
